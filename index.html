    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
    <!-- 新增：优质中文字体 - Noto Sans SC（思源黑体）-->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Core theme CSS -->

    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <!-- 👇 这里是全局字体 + 字号优化，直接复制这段 -->
    <style>
        /* 全局字体：英文用 Mulish，中文用 Noto Sans SC */
        body {
            font-family: "Mulish", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
            font-size: 15px !important; /* 整体正文比原来缩小 */
            line-height: 1.6 !important;
        }

        /* 标题缩小一点，更精致 */
        h2, .h2 {
            font-size: 1.5rem !important;
            font-weight: 600 !important;
        }

        /* 导航栏字体稍小 */
        .navbar-nav .nav-link {
            font-size: 0.95rem !important;
        }

        /* 正文内容区域字体 */
        .main-body {
            font-size: 15px !important;
            font-weight: 400 !important;
        }

        /* 图片禁止右键下载（你之前要的功能） */
        img {
            pointer-events: none !important;
            user-select: none !important;
            -webkit-user-drag: none !important;
        }
    </style>

    <!-- Bootstrap core JS-->
    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>

    <!-- For Compatability -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>

    <!-- Markdown -->
    <script type="text/javascript" src="static/js/marked.min.js"></script>

    <!-- Mathematics -->
    <script>
        MathJax = {
            tex: {
                packages: {},
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\\]']
                ],
                processEscapes: false,
                processEnvironments: true,
                processRefs: true,
                digits: /^(?:[0-9]+(?:\{,\}[0-9]{3})*(?:\.[0-9]*)?|\.[0-9]+)/,
                tags: 'all',
                tagSide: 'right',
                tagIndent: '0.8em',
                useLabelIds: true,
                maxMacros: 10000,
                maxBuffer: 5 * 1024,
                formatError:
                    (jax, err) => jax.formatError(err)
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script"
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Core JS-->
    <script type="text/javascript" src="static/js/scripts.js"></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>
